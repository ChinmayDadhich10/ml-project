<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator</title>
</head>
<body>
    <h1>Student Exam Performance Indicator</h1>

    <h1>Student Exam Performance Prediction</h1>

    <form action="{{ url_for('predict_data') }}" method="post">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
            <option value="" selected disabled>Select your Gender</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
        </select>
        <br>

        <label for="race_ethnicity">Race or Ethnicity</label>
        <select id="race_ethnicity" name="race_ethnicity" required>
            <option value="" selected disabled>Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>
        <br>

        <label for="parental_level_of_education">Parental Level of Education</label>
        <select id="parental_level_of_education" name="parental_level_of_education" required>
            <option value="" selected disabled>Select Parent Education</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select>
        <br>

        <label for="lunch">Lunch Type</label>
        <select id="lunch" name="lunch" required>
            <option value="" selected disabled>Select Lunch Type</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free/Reduced</option>
        </select>
        <br>

        <label for="test_preparation_course">Test preparation Course</label>
        <select id="test_preparation_course" name="test_preparation_course" required>
            <option value="" selected disabled>Select Test_course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>
        <br>

        <label for="writing_score">Writing Score out of 100</label>
        <input id="writing_score" name="writing_score" type="number" min="0" max="100" placeholder="Enter your score" required>
        <br>

        <label for="reading_score">Reading Score out of 100</label>
        <input id="reading_score" name="reading_score" type="number" min="0" max="100" placeholder="Enter your score" required>
        <br>

        <input type="submit" value="Predict your Maths Score">
    </form>

    <h2>THE prediction is {{ results }}</h2>
</body>
</html>
